# fly.toml app configuration file generated for dohun-sim-decode on 2026-07-06T18:01:15-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dohun-sim-decode'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  # auto-stop when idle: Fly bills $0 CPU/RAM for a stopped machine (only ~1¢/mo
  # rootfs), and auto_start wakes it on the next connection. Trade-off: the first
  # player of a session eats a cold boot (~7s tsx transpile + Fly wake). Practice
  # usage is bursty, so this idles to near-free vs. ~$3.32/mo always-on.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # keep ONE machine warm (the primary region = the designated MATCHMAKER_REGION):
  # ranked queueing fly-replays to it, so it must always be up. Other regions still
  # idle to zero and cold-boot on the first connection (auto_start).
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    # generous timeout + grace so the probe tolerates a cold boot (auto_start wakes
    # the machine on the first connection) without ever flapping the machine.
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

# DEDICATED CPU (the primary + high-traffic regions). The room loop runs a continuous
# 60 Hz Rapier physics step; on a burstable SHARED CPU that exhausts the burst credits
# within a minute, Fly then throttles the machine to its tiny baseline, the single-
# threaded event loop stalls, and even the trivial /health response blows past the probe
# timeout → the machine flaps "unhealthy" even with ONE player. A dedicated vCPU is never
# throttled, so the loop keeps real-time and /health always answers. auto_stop_machines=
# 'stop' means a region only runs while someone is connected, so idle cost stays ~0.
#
# COST DOWNGRADE (2026-07-09): this default applies to iad (always-warm matchmaker/primary
# = the dominant always-on bill) and sjc (US West). Dropped performance-2x/4GB →
# performance-1x/2GB: still ONE DEDICATED vCPU (no throttle-flap), half the cores + RAM.
# The 2nd core only ever bought GC/JIT headroom off the main thread (the sim loop is
# single-threaded), so a busy region may jitter slightly more under sustained multi-match
# load — acceptable for the traffic these see. Bump back to performance-2x if it stutters.
#
# COST PASS (2026-07-20): performance-1x/2048 → shared-cpu-4x/1024 on iad. MEASURED first
# (that is the only reason this is safe — the note above records a shared CPU flapping):
#   · one room's 60Hz step costs ~0.02 cores (1 robot) to ~0.03 (2v2) on fast hardware —
#     ~33-55 concurrent rooms per core. Idle draw is 0.01 cores; RSS is ~80MB.
#   · so the old flap was shared-cpu-**1x**, whose sustained baseline is a fraction of a
#     core ≈ ONE busy room. Fly's baseline scales with core count, so 4x has several times
#     the headroom at a fraction of a dedicated vCPU's price.
#   · memory could finally drop too: performance-* enforces a 2048MiB floor, shared does not.
# WATCH IT: `GET /api/perf` reports event-loop lag percentiles. If p99 climbs toward the
# 16.67ms step budget under real matches, go UP (shared-cpu-8x) or back to performance-1x —
# a throttled machine does not degrade gracefully, it stalls /health and flaps.
# EVERY other region runs shared-cpu-1x/1024MB via scripts/fly-deploy.sh — sjc joined the
# satellites in the same pass. `fly deploy` re-applies THIS block to every machine, which
# is why that script must always re-shrink them afterward.
[[vm]]
  size = 'shared-cpu-4x'
  memory = '1024mb'
