# fly.toml app configuration file generated for dohun-sim-decode on 2026-07-06T18:01:15-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dohun-sim-decode'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  # auto-stop when idle: Fly bills $0 CPU/RAM for a stopped machine (only ~1¢/mo
  # rootfs), and auto_start wakes it on the next connection. Trade-off: the first
  # player of a session eats a cold boot (~7s tsx transpile + Fly wake). Practice
  # usage is bursty, so this idles to near-free vs. ~$3.32/mo always-on.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    # generous timeout + grace so the probe tolerates a cold boot (auto_start wakes
    # the machine on the first connection) without ever flapping the machine.
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

# DEDICATED CPU. The room loop runs a continuous 60 Hz Rapier physics step; on a
# burstable shared CPU that exhausts the burst credits within a minute, Fly then
# throttles the machine to its tiny baseline, the single-threaded event loop stalls,
# and even the trivial /health response blows past the probe timeout → the machine
# flaps "unhealthy" even with ONE player. A dedicated vCPU is never throttled, so the
# loop keeps real-time and /health always answers. auto_stop_machines='stop' +
# min_machines_running=0 mean this only runs while someone is connected, so idle cost
# stays ~0 despite the bigger VM.
#
# performance-2x = 2 dedicated vCPUs. The Node sim loop is single-threaded (one event
# loop drives every room), so the 2nd core does NOT parallelize matches — but V8 runs
# GC + JIT on background threads, and giving those a dedicated core off the main thread
# removes the GC-pause stalls that jitter the 60 Hz loop under sustained play. The extra
# RAM (4GB) further cuts GC frequency. This is the single-thread headroom win; true
# multi-match parallelism would need worker threads (not done). Drop to 'performance-1x'
# /2048mb if cost matters more than smoothness.
[[vm]]
  size = 'performance-2x'
  memory = '4096mb'
