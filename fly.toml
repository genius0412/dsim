# fly.toml app configuration file generated for dohun-sim-decode on 2026-07-06T18:01:15-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dohun-sim-decode'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  # auto-stop when idle: Fly bills $0 CPU/RAM for a stopped machine (only ~1¢/mo
  # rootfs), and auto_start wakes it on the next connection. Trade-off: the first
  # player of a session eats a cold boot (~7s tsx transpile + Fly wake). Practice
  # usage is bursty, so this idles to near-free vs. ~$3.32/mo always-on.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
